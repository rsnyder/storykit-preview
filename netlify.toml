[build]
  publish = "public"

# Proxy /api/gh/* to the GitHub Contents API function
[[redirects]]
  from = "/api/gh/*"
  to   = "/.netlify/functions/gh-proxy/:splat"
  status = 200

# Proxy /api/raw/* to the raw content function (serves files with CORS headers)
[[redirects]]
  from = "/api/raw/*"
  to   = "/.netlify/functions/raw-proxy/:splat"
  status = 200

# Serve preview.html for /:owner/:repo/*filepath — must follow /api/* rules
[[redirects]]
  from = "/:owner/:repo/*"
  to   = "/preview.html"
  status = 200
